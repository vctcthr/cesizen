services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cesizen_php
    restart: unless-stopped
    environment:
      APP_ENV: dev
      APP_SECRET: "760009c02efea02edbc3a5ecbac81b59"
      DATABASE_URL: "mysql://cesizen:${DB_PASSWORD:-cesizen_pwd}@database:3306/cesizen?serverVersion=8.0"
    volumes:
      - ./var:/var/www/html/var
    depends_on:
      database:
        condition: service_healthy
    networks:
      - cesizen_network

  nginx:
    image: nginx:alpine
    container_name: cesizen_nginx
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - cesizen_network

  database:
    image: mysql:8.0
    container_name: cesizen_database
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cesizen
      MYSQL_USER: cesizen
      MYSQL_PASSWORD: ${DB_PASSWORD:-cesizen_pwd}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_pwd}
    volumes:
      - cesizen_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cesizen_network

  adminer:
    image: adminer
    container_name: cesizen_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - database
    networks:
      - cesizen_network

networks:
  cesizen_network:
    driver: bridge

volumes:
  cesizen_db_data:
